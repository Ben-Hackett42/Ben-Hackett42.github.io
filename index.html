<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ben Hackett -- Northern High</title>

  <style>
    body {
      background-color: lightgray;
    }

    .topnav {
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: lightskyblue;
    }

    .topnav a {
      color: black;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 23px;
      font-weight: bold;
      font-family: Arial, Helvetica, sans-serif;
    }

    .topnav a:hover {
      background-color: white;
      color: black;
    }

    .status {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 40px;
      text-align: center;
      color: black;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>

  <img
    src="FHPS_Logo.jpg"
    alt="FHPS_Logo"
    style="width: 200px; height: 200px; display: block; margin-left: 1%; margin-right: auto; margin-top: 1%;"
  />
</head>

<body>
  <div class="topnav">
    <a class="active" href="index.html">Home</a>
  </div>

  <img
    src="BrownTrout.jpg"
    alt="Ben Hackett"
    style="width: 900px; height: 250px; display: block; margin-left: auto; margin-right: auto; margin-top: 1.5%;"
  />

  <div class="status" id="status">Checking status...</div>

  <script>
    const statusDiv = document.getElementById("status");
    const apiURL =
      "https://script.google.com/macros/s/AKfycbx45CloYqAM6ds9O_csDMz7M4DtDvvI21oyaMhXK0hhaQLdSinmbrMyVP0N2WvXBJS9/exec";

    async function fetchStatus() {
      try {
        const res = await fetch(apiURL);
        const data = await res.json();
        if (data.status === "IN") {
          statusDiv.textContent = "✅ I am IN the building";
        } else if (data.status === "OUT") {
          statusDiv.textContent = "❌ I am OUT of the building";
        } else {
          statusDiv.textContent = "Status unknown.";
        }
      } catch (e) {
        statusDiv.textContent = "Error fetching status.";
        console.error(e);
      }
    }

    fetchStatus();
    setInterval(fetchStatus, 10000); // Refresh every 10 seconds
  </script>
</body>
</html>
