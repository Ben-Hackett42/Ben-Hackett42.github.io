    .status{
        font-family: Arial, Helvetica, sans-serif;

<body>

  <div class="topnav">
    <a class="active" href="index.html">Home</a>

    <img src="BrownTrout.jpg" alt="Ben Hackett" style="width:900px;height:250px;display:block;margin-left:auto;margin-right:auto;margin-top:1.5%;">
   
   <div class="status" id="status">Checking status...</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const statusParam = urlParams.get('status');
  const statusDiv = document.getElementById('status');

  if (statusParam === 'in') {
    statusDiv.textContent = 'I am IN the building';
  } else if (statusParam === 'out') {
    statusDiv.textContent = 'I am OUT of the building';
  } else {
    statusDiv.textContent = 'Status unknown.';
  }
</script>


</body>
