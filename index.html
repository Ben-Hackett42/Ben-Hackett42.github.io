<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ben Hackett Status</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background-color: rgba(211, 211, 211, 0.541);
    }

    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #cfe6eb 0%, #249fe6 100%);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 2px 0 6px rgba(0,0,0,0.1);
    }

    .sidebar img {
      width: 80%;
      height: auto;
      margin-bottom: 30px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .nav-links a {
      text-decoration: none;
      text-align: center;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 8px;
      color: #222;
      background-color: #ffffffc9;
      transition: background 0.2s, color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: #fff;
      color: #0096c7;
      box-shadow: 0 2px 6px rgba(0,180,216,0.1);
    }

    .content {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 800px;
    }

    .profile-img {
      margin-bottom: 24px;
    }

    .profile-img img {
      width: 65vw;
      max-width: 400px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .status {
      font-size: 35px;
      text-align: center;
      color: black;
      font-weight: bold;
      margin-top: 50px;
    }

    .extension {
      font-size: 25px;
      text-align: center;
      color: black;
      font-weight: bold;
      margin-top: 75px;
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        justify-content: space-around;
        padding: 16px;
        box-shadow: none;
      }

      .sidebar img {
        display: none;
      }

      .nav-links {
        flex-direction: row;
        gap: 12px;
      }

      .nav-links a {
        font-size: 16px;
        padding: 10px 14px;
      }


      .profile-img img {
        width: 90vw;
      }
    }
  </style>
</head>

<body>

 
  <aside class="sidebar">
    <img src="FHPS_Logo.jpg" alt="FHPS_Logo" />
    <nav class="nav-links">
      <a href="index.html" class="active" >Status</a>
      <a href="https://fhps.incidentiq.com" target="_blank" rel="noopener">Ticket</a>
       <a href="calendar.html">Calendar</a>
      <a href="about.html">About Me</a>
    </nav>
  </aside>

  
  <main class="content">
    <figure class="profile-img" style="width:100%; display: flex; justify-content: center;"></figure>
      <img src="BrownTrout.jpg" alt="Ben Hackett" style="width:100%; max-width:700px; border-radius: 15px;" />

    <div class="status" id="status">Checking status...</div>

    <div class="extension">
      <p>My Office Extension is 31641</p>
    </div>
  </main>


  <script>
    const statusDiv = document.getElementById("status");
    const apiURL =
      "https://script.google.com/macros/s/AKfycbx45CloYqAM6ds9O_csDMz7M4DtDvvI21oyaMhXK0hhaQLdSinmbrMyVP0N2WvXBJS9/exec";

    async function fetchStatus() {
      try {
        const res = await fetch(apiURL);
        const data = await res.json();
        if (data.status === "IN") {
          statusDiv.textContent = "✅ I am IN the building";
        } else if (data.status === "OUT") {
          statusDiv.textContent = "❌ I am OUT of the building";
        } else {
          statusDiv.textContent = "Status unknown.";
        }
      } catch (e) {
        statusDiv.textContent = "Error fetching status.";
        console.error(e);
      }
    }

    fetchStatus();
    setInterval(fetchStatus, 10000); // Refresh every 10 seconds
  </script>

</body>
</html>
