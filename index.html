<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ben Hackett Status</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background-color: rgba(211, 211, 211, 0.541);
    }

    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #cfe6eb 0%, #249fe6 100%);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 2px 0 6px rgba(0,0,0,0.1);
    }

    .sidebar img {
      width: 80%;
      height: auto;
      margin-bottom: 30px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .nav-links a {
      text-decoration: none;
      text-align: center;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 8px;
      color: #222;
      background-color: #ffffffc9;
      transition: background 0.2s, color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: #fff;
      color: #0096c7;
      box-shadow: 0 2px 6px rgba(0,180,216,0.1);
    }

    .content {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 800px;
    }

    .profile-img {
      margin-bottom: 24px;
    }

    .profile-img img {
      width: 65vw;
      max-width: 400px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    /* PULSE ANIMATION for status text */
    @keyframes pulse {
      0%, 100% {
        text-shadow: 0 0 5px rgba(0, 150, 199, 0.7);
      }
      50% {
        text-shadow: 0 0 20px rgba(0, 150, 199, 1);
      }
    }

    .status {
      font-size: 35px;
      text-align: center;
      color: black;
      font-weight: bold;
      margin-top: 50px;
      animation: pulse 2s infinite;
    }

    .extension {
      font-size: 25px;
      text-align: center;
      color: black;
      font-weight: bold;
      margin-top: 75px;
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        justify-content: space-around;
        padding: 16px;
        box-shadow: none;
      }

      .sidebar img {
        display: none;
      }

      .nav-links {
        flex-direction: row;
        gap: 12px;
      }

      .nav-links a {
        font-size: 16px;
        padding: 10px 14px;
      }


      .profile-img img {
        width: 90vw;
      }
    }



    body.weather-theme {
      display: flex;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      transition: background 1.5s ease, color 1.5s ease;
    }



    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    body.weather-theme.clear {
      background: linear-gradient(270deg, #87CEFA, #00BFFF, #ffffff);
      background-size: 600% 600%;
      animation: gradientShift 15s ease infinite;
      color: #333;
    }

    body.weather-theme.rain {
      background: linear-gradient(to bottom, #3a3a3a, #2c2c2c);
      color: white;
    }

    body.weather-theme.clouds {
      background: #d3d3d3;
      color: #222;
    }

    body.weather-theme.snow {
      background: #e0f7fa;
      color: #333;
    }

    body.weather-theme.thunderstorm {
      background: #1f1f1f;
      color: #fff700;
    }



  </style>
</head>

<body>

 
  <aside class="sidebar">
    <img src="FHPS_Logo.jpg" alt="FHPS_Logo" />
    <nav class="nav-links">
      <a href="index.html" class="active" >Status</a>
      <a href="https://fhps.incidentiq.com" target="_blank" rel="noopener">Ticket</a>
       <a href="calendar.html">Calendar</a>
      <a href="about.html">About Me</a>
    </nav>
  </aside>

  
  <main class="content">
    <figure class="profile-img" style="width:100%; display: flex; justify-content: center;"></figure>
      <img src="BrownTrout.jpg" alt="Ben Hackett" style="width:100%; max-width:700px; border-radius: 15px;" />

    <div class="status" id="status">Checking status...</div>

    <div class="extension">
      <p>My Office Extension is 31641</p>
    </div>
  </main>


<script>
  const statusDiv = document.getElementById("status");
  const apiURL =
    "https://script.google.com/macros/s/AKfycbx45CloYqAM6ds9O_csDMz7M4DtDvvI21oyaMhXK0hhaQLdSinmbrMyVP0N2WvXBJS9/exec";

  async function fetchStatus() {
    try {
      const res = await fetch(apiURL);
      const data = await res.json();
      if (data.status === "IN") {
        statusDiv.textContent = "✅ I am IN the building";
      } else if (data.status === "OUT") {
        statusDiv.textContent = "❌ I am OUT of the building";
      } else {
        statusDiv.textContent = "Status unknown.";
      }
    } catch (e) {
      statusDiv.textContent = "Error fetching status.";
      console.error(e);
    }
  }

  fetchStatus();
  setInterval(fetchStatus, 10000); // Refresh every 10 seconds

async function getWeather() {
  const lat = 42.985166728588155;
  const lon = -85.57566707452516; 
  const apiKey = '68ed19e47cae8e3992236d7350213ec4';
  
  const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;

  const response = await fetch(url);
  const data = await response.json();
  
  return data.weather[0].main.toLowerCase(); 
}

async function setWeatherTheme() {
  try {
    const weather = await getWeather();
    console.log("Weather from API:", weather); 

    document.body.classList.remove('clear', 'rain', 'clouds', 'snow', 'thunderstorm');
    document.body.classList.add('weather-theme', weather);
  } catch (error) {
    console.error('Error fetching or applying weather theme:', error);
  }
}

setWeatherTheme();

</script>


</body>
</html>
