<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ben Hackett — About Me</title>
  

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background-color: rgb(0, 0, 0);
    }

    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #080808 0%, #044266 100%);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 2px 0 6px rgba(0,0,0,0.1);
    }

    .sidebar img {
      width: 80%;
      height: auto;
      margin-bottom: 30px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .nav-links a {
      text-decoration: none;
      text-align: center;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 8px;
      color: #ffffff;
      background-color: #050000c9;
      transition: background 0.2s, color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: #999898;
      color: #000000;
      box-shadow: 0 2px 6px rgba(0,180,216,0.1);
    }

    .content {
      flex: 1;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }




    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        justify-content: space-around;
        padding: 16px;
        box-shadow: none;
      }

      .sidebar img {
        display: none;
      }

      .nav-links {
        flex-direction: row;
        gap: 12px;
      }

      .nav-links a {
        font-size: 16px;
        padding: 10px 14px;
      }

    }

    #NasaPic {
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        padding: 20px;
        background-color: rgba(134, 134, 134, 0.979);
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(15, 196, 228, 0.938);
        max-width: 800px;
        margin: auto;
    }
  </style>
</head>

<body>

  
  <aside class="sidebar">
    <img src="FHPS_Logo.jpg" alt="FHPS_Logo" />
    <nav class="nav-links">
      <a href="index.html">Status</a>
      <a href="https://fhps.incidentiq.com" target="_blank" rel="noopener">Ticket</a>
      <a href="calendar.html">Calendar</a>
      <a href="about.html">About Me</a>
      <a href="space.html" class="active">Space</a>
    </nav>
</aside>

<div id="NasaPic">
    <h1 id="nasaTitle"></h1>
    <div id="media"></div>
    <p id="desc"></p>
</div>

    <script src="space.js"></script>

</body>
</html>
