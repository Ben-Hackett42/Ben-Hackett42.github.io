<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ben Hackett — RAVE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        @keyframes pulse {
            0%   { transform: scale(1);   background-color: #f30707; }
            25%  { transform: scale(1.05);background-color: #fff; }
            50%  { transform: scale(1.1); background-color: #1100ff; }
            75%  { transform: scale(1.05);background-color: #f50606; }
            100% { transform: scale(1);   background-color: #fff; }
        }
        body.pulse-page {
            animation: pulse 2s ease-in-out infinite;
            display: flex;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
        }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #cfe6eb 0%, #249fe6 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 2px 0 6px rgba(0,0,0,0.1);
        }
        .sidebar img {
            width: 80%;
            height: auto;
            margin-bottom: 30px;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }
        .nav-links a {
            text-decoration: none;
            text-align: center;
            padding: 12px 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            color: #222;
            background-color: #ffffffc9;
            transition: background 0.2s, color 0.2s;
        }
        .nav-links a:hover,
        .nav-links a.active {
            background: #fff;
            color: #0096c7;
            box-shadow: 0 2px 6px rgba(0,180,216,0.1);
        }
        .content {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #000;
        }
        .box img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body class="pulse-page">
    <aside class="sidebar">
        <img src="FHPS_Logo.jpg" alt="FHPS Logo" />
        <nav class="nav-links">
            <a href="index.html">Status</a>
            <a href="https://fhps.incidentiq.com" target="_blank" rel="noopener">Ticket</a>
            <a href="calendar.html">Calendar</a>
            <a href="about.html">About Me</a>
            <a href="RAVE.html" class="active">404 ERROR</a>
        </nav>
    </aside>
    <main class="content">
        <div class="box">
            <h1>How did you get here?</h1>
            <img src="construction.jpg" alt="Under Construction" />
        </div>
    </main>
</body>
</html>
